  #       condition: service_completed_successfully

volumes:
  clickhouse_data:
    driver: local
  clickhouse_logs:
    driver: local
  postgres_dwh_data:
    driver: local
  minio_data:
    driver: local
  metabase_data:
    driver: local
  postgres_airflow_data:
    driver: local
  
networks:
  default:
    name: revolut_network
    driver: bridge
